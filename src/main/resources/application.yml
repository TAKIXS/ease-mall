server:
  port: 8080

spring:
  application:
    name: ease-mall

  # ==================== H2 内存数据库（零安装，重启后数据消失） ====================
  datasource:
    url: jdbc:h2:mem:mall;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true               # 开启 H2 网页控制台 http://localhost:8080/h2-console
      path: /h2-console

  # 自动执行 classpath 下的 schema.sql（建表）和 data.sql（数据）
  sql:
    init:
      mode: always

# ==================== MyBatis-Plus ====================
# 开发时打印 SQL，能看到每行代码对应什么 SQL 语句
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== Knife4j 文档 ====================
knife4j:
  enable: true
  setting:
    language: zh_cn

# ==================== 日志 ====================
logging:
  level:
    com.mall: debug

# ==================== JWT 配置 ====================
jwt:
  secret: ease-mall-jwt-secret-key-2024-must-be-at-least-256-bits-long!!
  expire-days: 7
