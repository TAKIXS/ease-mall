server:
  port: 8080

spring:
  application:
    name: ease-mall

  # ==================== MySQL（Docker，端口3307） ====================
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

  # ==================== Redis（Docker） ====================
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# ==================== MyBatis-Plus ====================
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== Knife4j 文档 ====================
knife4j:
  enable: true
  setting:
    language: zh_cn

# ==================== 日志 ====================
logging:
  level:
    com.mall: debug

# ==================== JWT ====================
jwt:
  secret: ease-mall-jwt-secret-key-2024-must-be-at-least-256-bits-long!!
  expire-days: 7
